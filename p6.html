<html>
<head>
<title>Registration Form</title>
</head>

<body>

<h2>Seminar Registration Form</h2>

<form>

<fieldset>
<legend>Personal Information</legend>

Name: <input type="text" name="name"><br><br>

Email: <input type="email" name="email"><br><br>

Mobile No: <input type="tel" name="mobile"><br><br>

Gender:
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other

<br><br>
College name: <input type="text" name="college name"><br><br>

</fieldset>

<br>

<fieldset>
<legend>Course Details</legend>

Branch:
<select name="branch">
<option>Computer Science</option>
<option>Information Technology</option>
<option>Mechanical</option>
<option>Civil</option>
<option>Electronics</option>
</select>

<br><br>

Year:
<select name="year">
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Fourth Year</option>
</select>

</fieldset>

<br>

<fieldset>
<legend>Seminar Interests</legend>

<input type="checkbox"> Artificial Intelligence <br>
<input type="checkbox"> Web Development <br>
<input type="checkbox"> Cyber Security <br>
<input type="checkbox"> Data Science

</fieldset>

<br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>

</body>
</html>
